name: Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      TMPDIR: /tmp
      TMP: /tmp
      TEMP: /tmp
      npm_config_cache: /tmp/.npm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Validate exports
        run: npm run validate:exports

      - name: Validate latest published tokens
        run: npm run validate:tokens

      - name: Build package
        run: npm run build

      - name: Validate CSS contract
        run: npm run validate:css-contract

      - name: Run tests
        run: npm test
