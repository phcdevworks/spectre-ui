<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Pill Variant Verification</title>
    <link rel="stylesheet" href="../dist/index.css">
    <style>
        body { padding: 2rem; display: grid; gap: 2rem; max-width: 400px; }
        section { display: grid; gap: 0.5rem; }
        h2 { font-family: sans-serif; font-size: 1rem; margin: 0; }
    </style>
</head>
<body>
    <section>
        <h2>Default Input</h2>
        <input type="text" class="sp-input sp-input--md" placeholder="Default radius">
    </section>

    <section>
        <h2>Pill Input</h2>
        <input type="text" class="sp-input sp-input--md sp-input--pill" placeholder="Pill radius">
    </section>

    <section>
        <h2>Pill Input (Small)</h2>
        <input type="text" class="sp-input sp-input--sm sp-input--pill" placeholder="Small pill">
    </section>

    <section>
        <h2>Pill Input (Large)</h2>
        <input type="text" class="sp-input sp-input--lg sp-input--pill" placeholder="Large pill">
    </section>
</body>
</html>
