<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectre UI — Input Pill Verification</title>
    <link rel="stylesheet" href="../dist/index.css" />
    <style>
      body {
        color: var(--sp-text-on-page-default);
        background: var(--sp-surface-page);
      }

      main {
        max-width: 560px;
        margin: 0 auto;
        padding: var(--sp-space-48) var(--sp-space-24) var(--sp-space-64);
        display: grid;
        gap: var(--sp-space-24);
      }

      .page-header,
      section {
        border-radius: var(--sp-radius-xl);
        border: var(--sp-component-border-width) solid
          var(--sp-color-neutral-200);
        background: var(--sp-surface-card);
        box-shadow: var(--sp-shadow-sm);
      }

      .page-header {
        padding: var(--sp-space-24);
        display: grid;
        gap: var(--sp-space-12);
      }

      .page-header h1,
      section h2 {
        margin: 0;
      }

      .page-header p {
        margin: 0;
        color: var(--sp-text-on-page-muted);
      }

      section {
        padding: var(--sp-space-20);
        gap: var(--sp-space-8);
      }

      section h2 {
        font-size: var(--sp-font-md-size);
      }

      @media (max-width: 640px) {
        main {
          padding-inline: var(--sp-space-16);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="page-header">
        <span class="sp-badge sp-badge--neutral sp-badge--sm">INPUT SHAPE</span>
        <h1>Input Pill Verification</h1>
        <p>
          Quick visual check for the default input radius versus the pill-radius
          treatment across sizes.
        </p>
      </section>

      <section>
        <h2>Default Input</h2>
        <input
          type="text"
          class="sp-input sp-input--md"
          placeholder="Default radius"
        />
      </section>

      <section>
        <h2>Pill Input</h2>
        <input
          type="text"
          class="sp-input sp-input--md sp-input--pill"
          placeholder="Pill radius"
        />
      </section>

      <section>
        <h2>Pill Input (Small)</h2>
        <input
          type="text"
          class="sp-input sp-input--sm sp-input--pill"
          placeholder="Small pill"
        />
      </section>

      <section>
        <h2>Pill Input (Large)</h2>
        <input
          type="text"
          class="sp-input sp-input--lg sp-input--pill"
          placeholder="Large pill"
        />
      </section>
    </main>
  </body>
</html>
