<!doctype html>
<html lang="en" data-spectre-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectre UI — Avatar Dark Mode Verification</title>
    <link rel="stylesheet" href="../dist/index.css" />
    <style>
      body {
        background-color: var(--sp-surface-page);
        color: var(--sp-text-on-page-default);
        padding: var(--sp-space-48);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: var(--sp-space-32);
      }
      .section {
        background: var(--sp-surface-card);
        padding: var(--sp-space-24);
        border: var(--sp-component-border-width) solid var(--sp-color-neutral-200);
        border-radius: var(--sp-radius-lg);
      }
      .row {
        display: flex;
        gap: var(--sp-space-16);
        align-items: center;
        flex-wrap: wrap;
        margin-top: var(--sp-space-16);
      }
      h2 { margin-bottom: var(--sp-space-8); }
    </style>
  </head>
  <body>
    <h1>Avatar — Dark Mode Verification</h1>
    <p>All surfaces below use <code>data-spectre-theme="dark"</code> on the root element.</p>

    <div class="grid">
      <div class="section">
        <h2>Sizes — Circle</h2>
        <div class="row">
          <div class="sp-avatar sp-avatar--xs sp-avatar--circle">XS</div>
          <div class="sp-avatar sp-avatar--sm sp-avatar--circle">SM</div>
          <div class="sp-avatar sp-avatar--md sp-avatar--circle">MD</div>
          <div class="sp-avatar sp-avatar--lg sp-avatar--circle">LG</div>
          <div class="sp-avatar sp-avatar--xl sp-avatar--circle">XL</div>
        </div>
      </div>

      <div class="section">
        <h2>Sizes — Square</h2>
        <div class="row">
          <div class="sp-avatar sp-avatar--xs sp-avatar--square">XS</div>
          <div class="sp-avatar sp-avatar--sm sp-avatar--square">SM</div>
          <div class="sp-avatar sp-avatar--md sp-avatar--square">MD</div>
          <div class="sp-avatar sp-avatar--lg sp-avatar--square">LG</div>
          <div class="sp-avatar sp-avatar--xl sp-avatar--square">XL</div>
        </div>
      </div>

      <div class="section">
        <h2>States</h2>
        <div class="row">
          <div class="sp-avatar sp-avatar--md sp-avatar--circle sp-avatar--interactive">IN</div>
          <div class="sp-avatar sp-avatar--md sp-avatar--circle sp-avatar--interactive is-hover">HV</div>
          <div class="sp-avatar sp-avatar--md sp-avatar--circle sp-avatar--interactive is-focus">FC</div>
          <div class="sp-avatar sp-avatar--md sp-avatar--circle sp-avatar--interactive is-active">AC</div>
          <div class="sp-avatar sp-avatar--md sp-avatar--circle sp-avatar--disabled">DB</div>
          <div class="sp-avatar sp-avatar--md sp-avatar--circle sp-avatar--loading">LD</div>
        </div>
      </div>

      <div class="section">
        <h2>Placeholder</h2>
        <div class="row">
          <div class="sp-avatar sp-avatar--md sp-avatar--circle sp-avatar--placeholder"></div>
          <div class="sp-avatar sp-avatar--md sp-avatar--square sp-avatar--placeholder"></div>
        </div>
      </div>
    </div>
  </body>
</html>
