<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectre UI — Badge Secondary Verification</title>
    <link rel="stylesheet" href="../../dist/index.css" />
    <style>
      body {
        color: var(--sp-text-on-page-default);
        background: var(--sp-surface-page);
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: var(--sp-space-48) var(--sp-space-24) var(--sp-space-64);
        display: grid;
        gap: var(--sp-space-24);
      }

      .page-header,
      .badge-strip {
        border-radius: var(--sp-radius-xl);
        border: var(--sp-component-border-width) solid
          var(--sp-color-neutral-200);
        background: var(--sp-surface-card);
        box-shadow: var(--sp-shadow-sm);
      }

      .page-header {
        padding: var(--sp-space-24);
        display: grid;
        gap: var(--sp-space-12);
      }

      .page-header h1,
      .badge-strip h2 {
        margin: 0;
      }

      .page-header p {
        margin: 0;
        color: var(--sp-text-on-page-muted);
      }

      .badge-strip {
        padding: var(--sp-space-20);
        display: grid;
        gap: var(--sp-space-16);
      }

      .badge-row {
        display: flex;
        gap: var(--sp-space-12);
        flex-wrap: wrap;
      }

      @media (max-width: 640px) {
        main {
          padding-inline: var(--sp-space-16);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="page-header">
        <span class="sp-badge sp-badge--secondary sp-badge--sm"
          >TARGETED FIXTURE</span
        >
        <h1>Badge Secondary Verification</h1>
        <p>
          Isolated badge snapshot for checking the secondary badge contract next
          to other semantic variants.
        </p>
      </section>

      <section class="badge-strip">
        <h2>Badge Variants</h2>
        <div class="badge-row">
          <span class="sp-badge sp-badge--primary">Primary</span>
          <span class="sp-badge sp-badge--secondary">Secondary</span>
          <span class="sp-badge sp-badge--secondary sp-badge--interactive"
            >Secondary Interactive</span
          >
          <span class="sp-badge sp-badge--success">Success</span>
          <span class="sp-badge sp-badge--warning">Warning</span>
          <span class="sp-badge sp-badge--danger">Danger</span>
        </div>
      </section>
    </main>
  </body>
</html>
