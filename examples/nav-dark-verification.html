<!doctype html>
<html lang="en" data-spectre-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectre UI — Nav Dark Mode Verification</title>
    <link rel="stylesheet" href="../dist/index.css" />
    <style>
      body {
        background-color: var(--sp-surface-page);
        color: var(--sp-text-on-page-default);
        padding: var(--sp-space-48);
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: var(--sp-space-32);
      }
      .section {
        background: var(--sp-surface-card);
        padding: var(--sp-space-24);
        border: var(--sp-component-border-width) solid var(--sp-color-neutral-200);
        border-radius: var(--sp-radius-lg);
      }
      h2 { margin-bottom: var(--sp-space-8); }
    </style>
  </head>
  <body>
    <h1>Nav — Dark Mode Verification</h1>
    <p>All surfaces below use <code>data-spectre-theme="dark"</code> on the root element.</p>

    <div class="stack">
      <div class="section">
        <h2>Default</h2>
        <nav class="sp-nav">
          <span>Brand</span>
          <div class="sp-nav__links">
            <a class="sp-nav__link sp-nav__link--active" href="#">Home</a>
            <a class="sp-nav__link" href="#">Docs</a>
            <a class="sp-nav__link" href="#">Pricing</a>
            <a class="sp-nav__link sp-nav__link--disabled" aria-disabled="true" href="#">Disabled</a>
          </div>
        </nav>
      </div>

      <div class="section">
        <h2>Bordered + Full Width</h2>
        <nav class="sp-nav sp-nav--bordered sp-nav--full">
          <span>Brand</span>
          <div class="sp-nav__links">
            <a class="sp-nav__link" href="#">Home</a>
            <a class="sp-nav__link" href="#">Docs</a>
          </div>
        </nav>
      </div>

      <div class="section">
        <h2>Link States</h2>
        <div class="sp-nav__links">
          <a class="sp-nav__link" href="#">Default</a>
          <a class="sp-nav__link sp-nav__link--hover is-hover" href="#">Hover</a>
          <a class="sp-nav__link sp-nav__link--focus is-focus" href="#">Focus</a>
          <a class="sp-nav__link sp-nav__link--active is-active" href="#">Active</a>
          <a class="sp-nav__link sp-nav__link--disabled" aria-disabled="true" href="#">Disabled</a>
        </div>
      </div>
    </div>
  </body>
</html>
