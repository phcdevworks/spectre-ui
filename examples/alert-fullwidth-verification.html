<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert FullWidth Verification</title>
  <link rel="stylesheet" href="../dist/index.css">
  <style>
    body {
      padding: 2rem;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .container {
      border: 1px solid #ccc;
      padding: 1rem;
      width: 500px;
    }
  </style>
</head>
<body>
  <h1>Alert FullWidth Verification</h1>

  <div class="container">
    <h2>Default Alert (width: auto)</h2>
    <div class="sp-alert sp-alert--info sp-alert--md">
      This is a default alert. It should not take the full width of its container.
    </div>
  </div>

  <div class="container">
    <h2>FullWidth Alert</h2>
    <div class="sp-alert sp-alert--info sp-alert--md sp-alert--full">
      This is a full-width alert. It should take the full width of its container.
    </div>
  </div>
</body>
</html>
