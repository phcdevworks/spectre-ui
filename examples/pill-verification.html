<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pill Button Verification</title>
  <link rel="stylesheet" href="../dist/index.css">
  <style>
    body {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border: 1px solid #eee;
      padding: 1rem;
      border-radius: 8px;
    }
    section h2 { margin-top: 0; }
  </style>
</head>
<body>
  <h1>Spectre UI Pill Button</h1>

  <section>
    <h2>Pill Button Variant</h2>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <button class="sp-btn sp-btn--primary">Default Button</button>
      <button class="sp-btn sp-btn--primary sp-btn--pill">Pill Button</button>
      <button class="sp-btn sp-btn--secondary sp-btn--pill">Secondary Pill</button>
      <button class="sp-btn sp-btn--ghost sp-btn--pill">Ghost Pill</button>
      <button class="sp-btn sp-btn--danger sp-btn--pill">Danger Pill</button>
    </div>
  </section>

</body>
</html>
