<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PricingCard Verification</title>
  <link rel="stylesheet" href="../dist/index.css">
  <style>
    body {
      padding: 40px;
      font-family: sans-serif;
      background-color: #f5f5f5;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }
    section {
      margin-bottom: 40px;
    }
    h2 {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <section>
    <h2>PricingCard States</h2>
    <div class="grid">
      <!-- Forced Hover State -->
      <div class="sp-pricing-card sp-pricing-card--interactive is-hover">
        <div class="sp-pricing-card-badge">Pro</div>
        <div class="sp-pricing-card-price-container">
          <span class="sp-pricing-card-price">$29</span>
          <span class="sp-pricing-card-description">/month</span>
        </div>
        <p>Forced Hover State (is-hover)</p>
      </div>

      <!-- Forced Focus State -->
      <div class="sp-pricing-card sp-pricing-card--interactive is-focus">
        <div class="sp-pricing-card-badge">Pro</div>
        <div class="sp-pricing-card-price-container">
          <span class="sp-pricing-card-price">$29</span>
          <span class="sp-pricing-card-description">/month</span>
        </div>
        <p>Forced Focus State (is-focus)</p>
      </div>

      <!-- Forced Active State -->
      <div class="sp-pricing-card sp-pricing-card--interactive is-active">
        <div class="sp-pricing-card-badge">Pro</div>
        <div class="sp-pricing-card-price-container">
          <span class="sp-pricing-card-price">$29</span>
          <span class="sp-pricing-card-description">/month</span>
        </div>
        <p>Forced Active State (is-active)</p>
      </div>

      <!-- aria-disabled -->
      <div class="sp-pricing-card" aria-disabled="true">
        <div class="sp-pricing-card-badge">Pro</div>
        <div class="sp-pricing-card-price-container">
          <span class="sp-pricing-card-price">$29</span>
          <span class="sp-pricing-card-description">/month</span>
        </div>
        <p>aria-disabled="true"</p>
      </div>

      <!-- aria-busy -->
      <div class="sp-pricing-card" aria-busy="true">
        <div class="sp-pricing-card-badge">Pro</div>
        <div class="sp-pricing-card-price-container">
          <span class="sp-pricing-card-price">$29</span>
          <span class="sp-pricing-card-description">/month</span>
        </div>
        <p>aria-busy="true"</p>
      </div>
    </div>
  </section>
</body>
</html>
