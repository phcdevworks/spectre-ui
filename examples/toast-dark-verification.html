<!doctype html>
<html lang="en" data-spectre-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectre UI — Toast Dark Mode Verification</title>
    <link rel="stylesheet" href="../dist/index.css" />
    <style>
      body {
        background-color: var(--sp-surface-page);
        color: var(--sp-text-on-page-default);
        padding: var(--sp-space-48);
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: var(--sp-space-32);
      }
      .section {
        background: var(--sp-surface-card);
        padding: var(--sp-space-24);
        border: var(--sp-component-border-width) solid var(--sp-color-neutral-200);
        border-radius: var(--sp-radius-lg);
      }
      .toast-list {
        display: flex;
        flex-direction: column;
        gap: var(--sp-space-12);
        margin-top: var(--sp-space-16);
      }
      h2 { margin-bottom: var(--sp-space-8); }
    </style>
  </head>
  <body>
    <h1>Toast — Dark Mode Verification</h1>
    <p>All surfaces below use <code>data-spectre-theme="dark"</code> on the root element.</p>

    <div class="stack">
      <div class="section">
        <h2>Variants</h2>
        <div class="toast-list">
          <div class="sp-toast sp-toast--info">
            <span class="sp-toast__icon sp-toast__icon--info">i</span>
            <span>Informational toast</span>
          </div>
          <div class="sp-toast sp-toast--success">
            <span class="sp-toast__icon sp-toast__icon--success">✓</span>
            <span>Success toast</span>
          </div>
          <div class="sp-toast sp-toast--warning">
            <span class="sp-toast__icon sp-toast__icon--warning">!</span>
            <span>Warning toast</span>
          </div>
          <div class="sp-toast sp-toast--danger">
            <span class="sp-toast__icon sp-toast__icon--danger">✕</span>
            <span>Danger toast</span>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Full Width</h2>
        <div class="toast-list">
          <div class="sp-toast sp-toast--info sp-toast--full">
            <span class="sp-toast__icon sp-toast__icon--info">i</span>
            <span>Full width informational toast</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
