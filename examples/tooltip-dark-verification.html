<!doctype html>
<html lang="en" data-spectre-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectre UI — Tooltip Dark Mode Verification</title>
    <link rel="stylesheet" href="../dist/index.css" />
    <style>
      body {
        background-color: var(--sp-surface-page);
        color: var(--sp-text-on-page-default);
        padding: var(--sp-space-48);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: var(--sp-space-64);
      }
      .section {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--sp-surface-card);
        padding: var(--sp-space-48);
        border: var(--sp-component-border-width) solid var(--sp-color-neutral-200);
        border-radius: var(--sp-radius-lg);
      }
      h2 { margin-bottom: var(--sp-space-8); }
    </style>
  </head>
  <body>
    <h1>Tooltip — Dark Mode Verification</h1>
    <p>All surfaces below use <code>data-spectre-theme="dark"</code> on the root element.</p>

    <div class="grid">
      <div class="section">
        <span>Top</span>
        <div class="sp-tooltip sp-tooltip--top sp-tooltip--visible">Top tooltip</div>
      </div>

      <div class="section">
        <span>Bottom</span>
        <div class="sp-tooltip sp-tooltip--bottom sp-tooltip--visible">Bottom tooltip</div>
      </div>

      <div class="section">
        <span>Left</span>
        <div class="sp-tooltip sp-tooltip--left sp-tooltip--visible">Left tooltip</div>
      </div>

      <div class="section">
        <span>Right</span>
        <div class="sp-tooltip sp-tooltip--right sp-tooltip--visible">Right tooltip</div>
      </div>
    </div>
  </body>
</html>
